<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizikal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        #timer {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        #progress {
            text-align: center;
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
        }
        #question-text {
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .choice {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
            border: 2px solid transparent;
            font-size: 15px;
        }
        .choice:hover {
            border-color: #4CAF50;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
        }
        #status {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin: 10px;
            color: #333;
        }
        #results {
            display: none;
        }
        #score-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        #score-card h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        #score-card p {
            font-size: 18px;
            margin: 8px 0;
            color: #444;
        }
        #score-display {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            margin: 20px 0;
        }
        .review-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #ccc;
        }
        .review-item.correct {
            border-left-color: #4CAF50;
        }
        .review-item.incorrect {
            border-left-color: #dc3545;
        }
        .review-question {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .review-answer {
            font-size: 14px;
            margin: 4px 0;
        }
        .review-explanation {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .correct-text { color: #4CAF50; font-weight: bold; }
        .incorrect-text { color: #dc3545; font-weight: bold; }
        #loading {
            text-align: center;
            font-size: 16px;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Quizikal</h1>

    <div id="start-screen">
        <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <div id="quiz-screen" style="display:none">
        <div id="timer">⏱ 0:00</div>
        <div id="progress">Question 1 of 10</div>
        <div id="loading">Loading question...</div>
        <div id="question-text"></div>
        <div id="choices"></div>
        <div id="status"></div>
    </div>

    <div id="results">
        <div id="score-card">
            <h2>Quiz Complete!</h2>
            <div id="score-display"></div>
            <p id="correct-display"></p>
            <p id="time-display"></p>
            <p id="message-display"></p>
            <button onclick="restartQuiz()">Try Again</button>
        </div>
        <h2 style="text-align:center">Question Review</h2>
        <div id="review-list"></div>
    </div>

    <script>
        let correctAnswer = '';
        let currentQuestion = 0;
        let correctCount = 0;
        let totalSeconds = 0;
        let timerInterval = null;
        let score = 0;
        let reviewData = [];

        function startQuiz() {
            currentQuestion = 0;
            correctCount = 0;
            totalSeconds = 0;
            score = 1000;
            reviewData = [];
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            startTimer();
            loadQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                totalSeconds++;
                score = Math.max(0, score - 1);
                const mins = Math.floor(totalSeconds / 60);
                const secs = totalSeconds % 60;
                document.getElementById('timer').innerHTML = 
                    `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        async function loadQuestion() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('question-text').innerHTML = '';
            document.getElementById('choices').innerHTML = '';
            document.getElementById('status').innerHTML = '';
            document.getElementById('progress').innerHTML = 
                `Question ${currentQuestion + 1} of 10`;

            const response = await fetch('/api/question');
            const data = await response.json();

            document.getElementById('loading').style.display = 'none';
            correctAnswer = data.correct;
            document.getElementById('question-text').innerHTML = data.question;

            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            for (const [letter, text] of Object.entries(data.choices)) {
                const div = document.createElement('div');
                div.className = 'choice';
                div.innerHTML = `<strong>${letter})</strong> ${text}`;
                div.onclick = () => selectAnswer(letter, data);
                choicesDiv.appendChild(div);
            }
        }

        function selectAnswer(letter, data) {
            const isCorrect = letter === data.correct;

            if (isCorrect) {
                correctCount++;
            } else {
                score = Math.max(0, score - 100);
            }

            reviewData.push({
                question: data.question,
                choices: data.choices,
                correct: data.correct,
                selected: letter,
                explanation: data.explanation,
                isCorrect
            });

            currentQuestion++;

            if (currentQuestion < 10) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            clearInterval(timerInterval);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results').style.display = 'block';

            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;

            let message = '';
            if (score >= 800) message = '🌟 Outstanding!';
            else if (score >= 600) message = '👍 Great job!';
            else if (score >= 400) message = '📚 Keep practicing!';
            else message = '💪 You can do it!';

            document.getElementById('score-display').innerHTML = score;
            document.getElementById('correct-display').innerHTML = 
                `${correctCount} out of 10 correct`;
            document.getElementById('time-display').innerHTML = 
                `Completed in ${timeStr}`;
            document.getElementById('message-display').innerHTML = message;

            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '';
            reviewData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `review-item ${item.isCorrect ? 'correct' : 'incorrect'}`;
                
                let choicesHTML = '';
                for (const [letter, text] of Object.entries(item.choices)) {
                    let style = '';
                    if (letter === item.correct) style = 'correct-text';
                    else if (letter === item.selected && !item.isCorrect) style = 'incorrect-text';
                    choicesHTML += `<div class="review-answer ${style}">
                        <strong>${letter})</strong> ${text}
                        ${letter === item.selected ? ' ← Your answer' : ''}
                        ${letter === item.correct && !item.isCorrect ? ' ← Correct answer' : ''}
                    </div>`;
                }

                div.innerHTML = `
                    <div class="review-question">
                        ${item.isCorrect ? '✅' : '❌'} Q${index + 1}: ${item.question}
                    </div>
                    ${choicesHTML}
                    <div class="review-explanation">
                        <strong>Explanation:</strong> ${item.explanation}
                    </div>
                `;
                reviewList.appendChild(div);
            });
        }

        function restartQuiz() {
            document.getElementById('results').style.display = 'none';
            startQuiz();
        }
    </script>
</body>
</html>
