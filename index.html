<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizikal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
        }
        #question {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>Quizikal</h1>
    <button onclick="getQuestion()">Generate Question</button>
    <div id="question">Click the button to generate your first question!</div>

    <script>
        async function getQuestion() {
            document.getElementById('question').innerHTML = 'Loading...';
            const response = await fetch('/api/question');
            const data = await response.json();
            document.getElementById('question').innerHTML = data.question;
        }
    </script>
</body>
</html>
